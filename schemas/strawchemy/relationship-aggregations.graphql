schema {
  query: QueryWithRelationshipAggregations
}

"""GraphQL type"""
type DepartmentType {
  employeesAggregate: EmployeeAggregate!

  """Fetch objects from the EmployeeType collection"""
  employees: [EmployeeType!]!
  id: String!
  name: String!
}

"""Aggregation fields"""
type EmployeeAggregate {
  count: Int
  max: EmployeeMinMaxFields!
  min: EmployeeMinMaxFields!
  sum: EmployeeSumFields!
}

"""GraphQL type"""
type EmployeeMinMaxFields {
  id: String
  name: String
  email: String
  passwordHash: String
  departmentId: String
}

"""GraphQL type"""
type EmployeeSumFields {
  id: String
  name: String
  email: String
  passwordHash: String
  departmentId: String
}

"""GraphQL type"""
type EmployeeType {
  department: DepartmentType!
  id: String!
  name: String!
  email: String!
  departmentId: String!
}

type QueryWithRelationshipAggregations {
  """Fetch objects from the DepartmentType collection"""
  departments: [DepartmentType!]!
}