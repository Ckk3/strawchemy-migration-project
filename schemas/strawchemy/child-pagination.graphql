schema {
  query: QueryWithChildPagination
}

"""GraphQL type"""
type DepartmentType {
  employeesAggregate: EmployeeAggregate!

  """Fetch objects from the EmployeeType collection"""
  employees: [EmployeeType!]!
  id: String!
  name: String!
}

"""GraphQL type"""
type DepartmentTypeWithChildPagination {
