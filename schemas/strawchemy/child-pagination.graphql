  """Fetch objects from the EmployeeType collection"""
  employees(limit: Int = 100, offset: Int! = 0): [EmployeeType!]!
  id: String!
  name: String!
}

"""Aggregation fields"""
type EmployeeAggregate {
  count: Int
  max: EmployeeMinMaxFields!
